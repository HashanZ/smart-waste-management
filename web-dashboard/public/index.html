<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.svg" type="image/svg+xml" />
    <link rel="alternate icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- Viewport and Mobile Optimization -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#22c55e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- SEO Meta Tags -->
    <meta
      name="description"
      content="Smart Waste Management System - Real-time monitoring and efficient management of waste collection operations. Track bins, optimize routes, and manage collections with IoT-powered analytics."
    />
    <meta
      name="keywords"
      content="waste management, smart bins, IoT, recycling, sustainability, waste collection, route optimization"
    />
    <meta name="author" content="Smart Waste Management Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Smart Waste Management System" />
    <meta property="og:description" content="Real-time waste management dashboard with IoT integration and route optimization" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Smart Waste Management System" />
    <meta name="twitter:description" content="Real-time waste management dashboard with IoT integration" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />

    <!-- Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS Prefetch for better performance -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />

    <!-- Title -->
    <title>Smart Waste Management - Dashboard</title>
  </head>
  <body>
    <noscript>
      <div style="padding: 20px; text-align: center; background: #fee2e2; color: #991b1b; border: 2px solid #dc2626; margin: 20px; border-radius: 8px;">
        <h1>JavaScript Required</h1>
        <p>You need to enable JavaScript to run this application. Please enable JavaScript in your browser settings and refresh the page.</p>
      </div>
    </noscript>
    <div id="root" role="application" aria-label="Smart Waste Management Dashboard"></div>
  </body>
</html>
